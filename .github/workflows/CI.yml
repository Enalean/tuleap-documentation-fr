name: CI

permissions: read-all

on:
  push:
    branches:
      - master
      - '[0-9]+.[0-9]+'
  pull_request:

jobs:
  build_warning_nix:
    name: Build with Nix
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: cachix/install-nix-action@e8dbd0c99268f4acbb432e443018da10b7ed9bdc # V28
      - name: Build
        run: nix-shell --pure --run 'make SPHINXOPTS='-W' html'
